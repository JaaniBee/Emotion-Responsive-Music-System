<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion-Responsive Music System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- FaceAPI.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
</head>
<body data-emotion="neutral">
    
    <div class="app-container">
        
        <header class="glass-panel text-center">
            <h1><i class="fa-solid fa-headphones-simple"></i> Emotion Music</h1>
            <p>Your face controls the playlist.</p>
        </header>

        <main class="content-grid">
            
            <!-- Camera & Emotion Section -->
            <section class="camera-section glass-panel">
                <div class="video-container">
                    <video id="webcam" autoplay muted playsinline></video>
                    <!-- Overlay for face tracking box -->
                    <canvas id="overlay"></canvas> 
                    <div id="loading-overlay" class="loading-overlay">
                        <div class="spinner"></div>
                        <p>Loading Deep Learning Models...</p>
                    </div>
                </div>
                
                <div class="emotion-display">
                    <h2>Current Mood</h2>
                    <div class="emotion-badge" id="emotion-status">
                        <i class="fa-solid fa-face-meh"></i> <span>Neutral</span>
                    </div>
                </div>
            </section>

            <!-- Music Player Section -->
            <section class="music-section glass-panel">
                <h2>Suggested Playlist</h2>
                <div class="player-container fade-in" id="spotify-container">
                     <iframe 
                        id="spotify-iframe"
                        src="https://open.spotify.com/embed/playlist/37i9dQZF1DXcBWIGoYBM5M" 
                        width="100%" 
                        height="352" 
                        frameBorder="0" 
                        allowfullscreen="" 
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                        loading="lazy">
                    </iframe>
                </div>
            </section>

        </main>
    </div>

    <script defer src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
